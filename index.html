<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Auth Screen -->
    <div id="auth-screen" class="screen active">
      <div class="auth-bg">
        <div class="auth-orb orb1"></div>
        <div class="auth-orb orb2"></div>
        <div class="auth-orb orb3"></div>
      </div>
      <div class="auth-card">
        <div class="auth-logo">
          <span class="logo-icon">🗓</span>
          <h1>Family<span>Cal</span></h1>
        </div>
        <p class="auth-subtitle">The shared calendar for Madeleine, Caroline & Steven</p>
        <button id="sign-in-btn" class="btn btn-primary btn-large">
          <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Sign in with Google
        </button>
        <p class="auth-note">Connect your Google Calendar to get started</p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-screen" class="screen">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="app-logo">
            <span>🗓</span>
            <span class="logo-text">Family<strong>Cal</strong></span>
          </div>
        </div>

        <button id="add-event-btn" class="btn btn-primary btn-add">
          <span>+</span> New Event
        </button>

        <div class="mini-nav">
          <button class="nav-btn active" data-view="week">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Week
          </button>
          <button class="nav-btn" data-view="month">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/></svg>
            Month
          </button>
          <button class="nav-btn" data-view="agenda">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            Agenda
          </button>
        </div>

        <div class="family-legend">
          <h3>Family Members</h3>
          <div class="member-list">
            <label class="member-item">
              <input type="checkbox" class="member-toggle" data-member="Madeleine" checked>
              <span class="member-dot" style="background:#8b5cf6"></span>
              <span class="member-name">Madeleine</span>
            </label>
            <label class="member-item">
              <input type="checkbox" class="member-toggle" data-member="Caroline" checked>
              <span class="member-dot" style="background:#ec4899"></span>
              <span class="member-name">Caroline</span>
            </label>
            <label class="member-item">
              <input type="checkbox" class="member-toggle" data-member="Steven" checked>
              <span class="member-dot" style="background:#3b82f6"></span>
              <span class="member-name">Steven</span>
            </label>
          </div>
        </div>

        <div class="sidebar-footer">
          <div id="user-info" class="user-info">
            <div class="user-avatar" id="user-avatar">M</div>
            <div class="user-details">
              <span id="user-name">Loading...</span>
              <button id="sign-out-btn" class="sign-out-link">Sign out</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="calendar-header">
          <div class="header-nav">
            <button id="prev-btn" class="icon-btn">&#8249;</button>
            <h2 id="current-period">Loading...</h2>
            <button id="next-btn" class="icon-btn">&#8250;</button>
          </div>
          <button id="today-btn" class="btn btn-ghost">Today</button>
        </header>

        <!-- Week View -->
        <div id="week-view" class="calendar-view active">
          <div class="week-grid">
            <div class="time-gutter">
              <div class="time-header"></div>
            </div>
            <div id="week-days-header" class="week-days-header"></div>
          </div>
          <div class="week-body-wrap">
            <div class="time-column" id="time-column"></div>
            <div id="week-body" class="week-body"></div>
          </div>
        </div>

        <!-- Month View -->
        <div id="month-view" class="calendar-view">
          <div id="month-grid" class="month-grid"></div>
        </div>

        <!-- Agenda View -->
        <div id="agenda-view" class="calendar-view">
          <div id="agenda-list" class="agenda-list"></div>
        </div>
      </main>
    </div>
  </div>

  <!-- Event Modal -->
  <div id="event-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">New Event</h3>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="event-title" placeholder="Event title" class="form-input" />
        </div>
        <div class="form-group">
          <label>Family Member</label>
          <div class="member-selector" id="member-selector">
            <button type="button" class="member-btn" data-member="Madeleine" style="--color:#8b5cf6">Madeleine</button>
            <button type="button" class="member-btn" data-member="Caroline" style="--color:#ec4899">Caroline</button>
            <button type="button" class="member-btn" data-member="Steven" style="--color:#3b82f6">Steven</button>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="event-date" class="form-input" />
          </div>
          <div class="form-group">
            <label>All Day</label>
            <label class="toggle-switch">
              <input type="checkbox" id="all-day-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div id="time-fields" class="form-row">
          <div class="form-group">
            <label>Start Time</label>
            <input type="time" id="event-start" class="form-input" value="09:00" />
          </div>
          <div class="form-group">
            <label>End Time</label>
            <input type="time" id="event-end" class="form-input" value="10:00" />
          </div>
        </div>
        <div class="form-group">
          <label>Reminder</label>
          <select id="event-reminder" class="form-input">
            <option value="0">No reminder</option>
            <option value="10" selected>10 minutes before</option>
            <option value="30">30 minutes before</option>
            <option value="60">1 hour before</option>
            <option value="1440">1 day before</option>
          </select>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="event-notes" placeholder="Optional notes..." class="form-input form-textarea"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button id="delete-event-btn" class="btn btn-danger hidden">Delete</button>
        <div class="modal-actions">
          <button id="cancel-modal-btn" class="btn btn-ghost">Cancel</button>
          <button id="save-event-btn" class="btn btn-primary">Save Event</button>
        </div>
      </div>
    </div>
  </div>


  <!-- Mobile Bottom Nav -->
  <nav class="mobile-nav" id="mobile-nav">
    <button class="mobile-nav-btn active" data-view="week">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Week
    </button>
    <button class="mobile-nav-btn" data-view="month">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="14"/></svg>
      Month
    </button>
    <button class="mobile-nav-btn add-btn" id="mobile-add-btn">+</button>
    <button class="mobile-nav-btn" data-view="agenda">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Agenda
    </button>
    <button class="mobile-nav-btn" id="mobile-filter-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Family
    </button>
  </nav>

  <!-- Mobile Filter Drawer -->
  <div id="mobile-drawer" style="display:none;position:fixed;bottom:64px;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:20px;z-index:49;border-radius:20px 20px 0 0;box-shadow:0 -8px 32px rgba(139,92,246,0.12);">
    <h3 style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-muted);margin-bottom:12px;">Family Members</h3>
    <div class="member-list">
      <label class="member-item"><input type="checkbox" class="member-toggle" data-member="Madeleine" checked><span class="member-dot" style="background:#8b5cf6"></span><span class="member-name">Madeleine</span></label>
      <label class="member-item"><input type="checkbox" class="member-toggle" data-member="Caroline" checked><span class="member-dot" style="background:#ec4899"></span><span class="member-name">Caroline</span></label>
      <label class="member-item"><input type="checkbox" class="member-toggle" data-member="Steven" checked><span class="member-dot" style="background:#3b82f6"></span><span class="member-name">Steven</span></label>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
